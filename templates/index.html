<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>AI Recipe Generator</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                max-width: 700px;
                margin: 50px auto;
                padding: 20px;
                background-color: #f9f9f9;
            }

            h1 {
                color: #2c7a4b;
            }
            
 textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 8px;
            resize: vertical;
        }

        button {
            margin-top: 10px;
            padding: 12px 25px;
            background-color: #2c7a4b;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #245f3c;
        }

        .result {
            margin-top: 30px;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #ddd;
            white-space: pre-wrap;
        }

        .result h2 {
            color: #2c7a4b;
        }
    </style>
</head>
<body>
    
    <h1>AI Recipe Generator</h1>
    <p>Enter the ingredients you have, and I'll suggest a delicious meal for you!</p>

    <form action="generate" method="POST">
        <textarea
            name="ingredients"
            placeholder="e.g., chicken, rice, broccoli, garlic, olive...">{% if ingredients %}{{ ingredients }}{% endif %}</textarea>
            <br>
            <button type="submit">Generate Recipe</button>
        </form>

        {% if recipe %}
        <div class="result">
            <h2>Here's your recipe:</h2>
            <p>{{ recipe }}</p>
        </div>
        {% endif %}
</body>
</html>
